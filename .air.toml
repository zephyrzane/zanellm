[build]
  cmd = "go build -o ./tmp/zanellm ./cmd/zanellm"
  entrypoint = "./tmp/zanellm"
  include_ext = ["go", "yaml"]
  exclude_dir = ["ui", "tmp", "vendor", "docs", "enterprise"]
  delay = 200

[run]
  args = ["--config", "zanellm.yaml"]

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
