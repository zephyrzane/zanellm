name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # SemVer pre-release tags carry a hyphen (e.g. v0.0.22-beta.1).
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMG=ghcr.io/zanellm/zanellm
          # Stable releases get the immutable version tag plus :latest.
          # Pre-releases (v*-beta.N) get the version tag plus a floating :beta,
          # and NEVER :latest — so users on :latest stay on stable.
          {
            echo "tags<<EOF"
            echo "${IMG}:${{ steps.version.outputs.version }}"
            if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
              echo "${IMG}:beta"
            else
              echo "${IMG}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/zanellm/zanellm@${{ steps.build.outputs.digest }}

  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X 'github.com/zanellm/zanellm/internal/api/health.Version=${VERSION}'"
          declare -A TARGETS=(
            ["linux/amd64"]="zanellm-linux-amd64.tar.gz"
            ["linux/arm64"]="zanellm-linux-arm64.tar.gz"
            ["windows/amd64"]="zanellm-windows-amd64.zip"
            ["windows/arm64"]="zanellm-windows-arm64.zip"
            ["darwin/amd64"]="zanellm-darwin-amd64.tar.gz"
            ["darwin/arm64"]="zanellm-darwin-arm64.tar.gz"
          )
          mkdir -p dist
          for TARGET in "${!TARGETS[@]}"; do
            OS="${TARGET%/*}"
            ARCH="${TARGET#*/}"
            ARCHIVE="${TARGETS[$TARGET]}"
            BINARY="zanellm"
            if [ "$OS" = "windows" ]; then
              BINARY="zanellm.exe"
            fi
            BUILDDIR="dist/build-${OS}-${ARCH}"
            mkdir -p "$BUILDDIR"
            CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" go build \
              -ldflags="$LDFLAGS" \
              -o "$BUILDDIR/$BINARY" ./cmd/zanellm
            if [[ "$ARCHIVE" == *.tar.gz ]]; then
              tar -czf "dist/$ARCHIVE" -C "$BUILDDIR" "$BINARY"
            else
              (cd "$BUILDDIR" && zip "../$ARCHIVE" "$BINARY")
            fi
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark pre-release tags (v*-beta.N) as GitHub pre-releases so they are
          # not surfaced as the latest stable release. Hand-written notes created
          # before the tag are preserved (create no-ops via || true, then upload).
          PRERELEASE=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then PRERELEASE="--prerelease"; fi
          gh release create "$GITHUB_REF_NAME" --generate-notes $PRERELEASE 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.zip --clobber

  provenance:
    needs: docker
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/zanellm/zanellm
      digest: ${{ needs.docker.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
