info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Verifies credentials and returns a 24-hour session token. Revokes
        any existing session for the user.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_admin.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_admin.loginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      summary: Authenticate with email and password
      tags:
      - auth
  /dashboard/stats:
    get:
      description: 'Returns aggregate key counts and 24-hour usage metrics. Scope
        is determined by the caller''s role: org (admin), team (team_admin), or user
        (member).'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_admin.dashboardStatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard statistics
      tags:
      - dashboard
  /invites/peek:
    get:
      description: Returns invite metadata (org name, role, expiry) for display in
        the registration UI. No authentication required.
      parameters:
      - description: Invite token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_admin.peekInviteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      summary: Peek at an invite
      tags:
      - invites
  /invites/redeem:
    post:
      consumes:
      - application/json
      description: Creates a new user account and org membership from a valid invite
        token. No authentication required.
      parameters:
      - description: Redemption parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_admin.redeemInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_admin.redeemInviteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      summary: Redeem an invite
      tags:
      - invites
  /me:
    get:
      description: Returns the profile of the user associated with the current session
        key.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_admin.meResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Get authenticated user profile
      tags:
      - auth
  /me/available-models:
    get:
      description: Returns model names accessible to the caller's org, team, and key
        scope.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_admin.availableModelsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: List models available to the authenticated key
      tags:
      - auth
  /models:
    get:
      description: Returns a cursor-paginated list of models. Requires system admin.
      parameters:
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor (UUIDv7 of the last seen model)
        in: query
        name: cursor
        type: string
      - description: Include inactive models
        in: query
        name: include_inactive
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_admin.paginatedModelsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: List models
      tags:
      - models
    post:
      consumes:
      - application/json
      description: Persists a new model and adds it to the live registry. The API
        key is encrypted at rest. Requires system admin.
      parameters:
      - description: Model parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_admin.createModelRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_admin.modelResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a model
      tags:
      - models
  /models/{model_id}:
    delete:
      description: Soft-deletes the model and removes it from the live registry. Requires
        system admin.
      parameters:
      - description: Model ID
        in: path
        name: model_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_admin.swaggerErrorResponse'
        "500":
