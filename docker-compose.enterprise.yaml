services:
  zanellm:
    image: ghcr.io/zanellm/zanellm:latest
    ports:
      - "8080:8080"
    volumes:
      - ./zanellm.yaml:/etc/zanellm/zanellm.yaml:ro
      - ./zanellm.license.jwt:/etc/zanellm/zanellm.license.jwt:ro
    environment:
      - ZANELLM_ADMIN_KEY=${ZANELLM_ADMIN_KEY}
      - ZANELLM_ENCRYPTION_KEY=${ZANELLM_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zanellm
      POSTGRES_USER: zanellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zanellm"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
