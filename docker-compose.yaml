services:
  zanellm:
    image: ghcr.io/zanellm/zanellm:latest
    ports:
      - "8080:8080"
    volumes:
      - ./zanellm.yaml:/etc/zanellm/zanellm.yaml:ro
      - ./zanellm.license.jwt:/etc/zanellm/zanellm.license.jwt:ro
      - zanellm_data:/data
    environment:
      - ZANELLM_ADMIN_KEY=${ZANELLM_ADMIN_KEY}
      - ZANELLM_ENCRYPTION_KEY=${ZANELLM_ENCRYPTION_KEY}
    restart: unless-stopped

volumes:
  zanellm_data:
