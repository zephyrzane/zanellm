# -- Number of replicas. >1 requires PostgreSQL + Redis (Enterprise).
replicaCount: 1

image:
  repository: ghcr.io/zanellm/zanellm
  # -- Overrides the image tag (default: Chart appVersion)
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  annotations: {}
  # -- Name override (default: release fullname)
  name: ""

# ---------------------------------------------------------------------------
# ZaneLLM application configuration (rendered as zanellm.yaml ConfigMap)
# ---------------------------------------------------------------------------
config:
  server:
    proxy:
      port: 8080
      readTimeout: 30s
      writeTimeout: 120s
      idleTimeout: 60s
      maxRequestBody: 20971520    # 20 MB
      maxResponseBody: 52428800   # 50 MB
      maxStreamDuration: 5m
    admin:
      # -- Separate admin port. 0 = combined mode (everything on proxy port).
      port: 0
      tls:
        # -- Enable TLS on the admin port. Requires cert and key paths.
        enabled: false
        cert: /certs/tls.crt
        key: /certs/tls.key

  database:
    # -- Database driver: sqlite or postgres
    driver: sqlite
    # -- SQLite path (ignored when postgres). PG example:
    #    postgres://user:pass@host:5432/zanellm?sslmode=require
    dsn: /data/zanellm.db
    maxOpenConns: 25
    maxIdleConns: 5
    connMaxLifetime: 5m

  cache:
    keyTTL: 30s
    modelTTL: 60s
    aliasTTL: 60s

  redis:
    # -- Key prefix for all Redis keys. Used when redis subchart is enabled.
    keyPrefix: "zanellm:"

  logging:
    level: info
    format: json

  settings:
    bootstrap:
      orgName: "Default"
      orgSlug: ""
      adminEmail: "admin@zanellm.local"
    usage:
      bufferSize: 1000
      flushInterval: 5s
      dropOnFull: true
    tokenCounting:
      enabled: true
    softLimitThreshold: 0.9
    audit:
      # -- Enable enterprise audit logging (requires license with audit_logs feature)
      enabled: false
      bufferSize: 500
      flushInterval: 5s
    circuitBreaker:
      # -- Enable per-model circuit breaker for upstream errors
      enabled: false
      threshold: 5
      timeout: 30s
      halfOpenMax: 1
    otel:
      # -- Enable OpenTelemetry tracing (requires license with otel_tracing feature)
      enabled: false
      endpoint: "localhost:4317"
      insecure: false
      sampleRate: 1.0
    sso:
      # -- Enable SSO/OIDC (requires license with sso_oidc feature)
      enabled: false
      issuer: ""
      clientId: ""
      redirectUrl: ""
      scopes: ["openid", "email", "profile"]
      allowedDomains: []
      defaultRole: "member"
      defaultOrg: ""
      autoProvision: true
      groupSync: false
      groupClaim: "groups"
    mcp:
      # -- MCP tool call timeout
      callTimeout: 30s
      # -- Allow MCP servers on private/loopback IPs (disable for production)
      allowPrivateUrls: false
      codeMode:
        # -- Enable Code Mode (WASM-sandboxed JS execution for MCP tool orchestration)
        enabled: false
        memoryLimitMb: 16
        timeout: 30s
        poolSize: 8
        maxToolCalls: 50
    healthCheck:
      health:
        enabled: true
        interval: 30s
      functional:
        enabled: true
        interval: 5m

  # -- Static MCP server definitions (optional — can be managed via Admin API)
  mcpServers: []
  # - name: GitHub
  #   alias: github
  #   url: https://mcp.github.com/sse
  #   auth_type: bearer
  #   auth_token: ${GITHUB_TOKEN}

  # -- Static model definitions (optional — can be managed via Admin API)
  models: []
  # - name: gpt-4o
  #   provider: openai
  #   base_url: https://api.openai.com/v1
  #   api_key: ${OPENAI_KEY}
  #   aliases: [default]

# ---------------------------------------------------------------------------
# Secrets
# ---------------------------------------------------------------------------
secrets:
  # -- Admin bootstrap key (≥32 chars). Auto-generated if empty.
  adminKey: ""
  # -- AES-256-GCM encryption key (base64, 32 bytes). Auto-generated if empty.
  encryptionKey: ""
  # -- License key (optional, for Pro/Enterprise features)
  license: ""
  # -- SSO/OIDC client secret (required when SSO is enabled)
  ssoClientSecret: ""
  # -- Extra environment variables for model API keys
  extraEnv: {}
  # OPENAI_KEY: "sk-..."
  # ANTHROPIC_KEY: "sk-ant-..."

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: zanellm.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: zanellm-tls
  #   hosts:
  #     - zanellm.example.com

# ---------------------------------------------------------------------------
# Persistence (SQLite only — ignored when database.driver=postgres)
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: ""
  accessModes: [ReadWriteOnce]
  size: 1Gi
  annotations: {}

# ---------------------------------------------------------------------------
# Resources & Scaling
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  # -- Requires PostgreSQL + Redis for correct multi-instance operation.
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Pod configuration
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# ---------------------------------------------------------------------------
# Optional subcharts
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Istio (optional)
# ---------------------------------------------------------------------------
istio:
  # -- Enable Istio VirtualService (and optionally Gateway) resources
  enabled: false
  gateway:
    # -- Name of an existing Gateway. Leave empty to create one.
    name: ""
    # -- Namespace of existing Gateway (default: release namespace)
    namespace: ""
    servers:
      - port:
          number: 443
          name: https
          protocol: HTTPS
        tls:
          mode: SIMPLE
          credentialName: zanellm-tls
        hosts:
          - zanellm.example.com
  virtualService:
    hosts:
      - zanellm.example.com

# ---------------------------------------------------------------------------
# Optional subcharts
# ---------------------------------------------------------------------------

# -- Bitnami PostgreSQL subchart
postgresql:
  enabled: false
  auth:
    database: zanellm
    username: zanellm
    password: ""
  primary:
    persistence:
      size: 10Gi

# -- Bitnami Redis subchart (Enterprise feature)
redis:
  enabled: false
  auth:
    password: ""
  architecture: standalone

# ---------------------------------------------------------------------------
# Schema migration pre-upgrade hook (PostgreSQL multi-replica deployments)
# ---------------------------------------------------------------------------
# When enabled, a Helm pre-upgrade Job runs "zanellm migrate-schema" before
# the Deployment is updated. PostgreSQL advisory locking ensures the job runs
# exactly once even if the Job pod is restarted. Recommended when
# replicaCount > 1 and database.driver is postgres.
migrations:
  hook:
    enabled: false
